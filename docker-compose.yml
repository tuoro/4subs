services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: 4subs:local
    container_name: 4subs
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - HTTP_ADDR=:8080
      - DATA_DIR=/app/data
      - WORK_DIR=/app/work
      - CONFIG_DIR=/app/config
      - STATIC_DIR=/app/web/dist
      - SUBTITLE_OUTPUT_PATH=/app/subtitles
      - MEDIA_PATHS=/media
      - FFMPEG_BIN=ffmpeg
      - TRANSLATION_PROVIDER=${TRANSLATION_PROVIDER:-deepseek}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - ASR_PROVIDER=${ASR_PROVIDER:-openai-compatible}
      - ASR_BASE_URL=${ASR_BASE_URL:-https://api.openai.com/v1}
      - ASR_MODEL=${ASR_MODEL:-whisper-1}
    volumes:
      - ./deploy/config:/app/config
      - ./deploy/data:/app/data
      - ./deploy/work:/app/work
      - ./deploy/subtitles:/app/subtitles
      - ${MEDIA_HOST_PATH:-./media}:/media:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
